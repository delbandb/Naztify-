<!doctype html>
<html>
<head>
  <title>💌 Notifications</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="💌 Notifier" />
  <link rel="manifest" href="/manifest.json" />
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
  <script>
    window.OneSignalDeferred = window.OneSignalDeferred || [];
    OneSignalDeferred.push(async function(OneSignal) {
      await OneSignal.init({
        appId: "1a0d2289-603b-42c4-9069-c0a93482fc0f",
        serviceWorkerParam: { scope: "/" },
        serviceWorkerPath: "/OneSignalSDKWorker.js",
        notifyButton: { enable: false },
      });
    });

    async function subscribe() {
      OneSignalDeferred.push(async function(OneSignal) {
        await OneSignal.Notifications.requestPermission();
        const granted = OneSignal.Notifications.permission;
        const status = document.getElementById('status');
        if (granted) {
          status.textContent = "✅ You're subscribed! You'll receive messages.";
          status.style.color = "#6fcf97";
          document.getElementById('btn').style.display = "none";
        } else {
          status.textContent = "❌ Denied — go to Settings → Safari → Notifications and allow it.";
          status.style.color = "#ff6b6b";
        }
      });
    }
  </script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
      text-align: center;
      background: #0d0d0d;
      color: white;
    }
    .container { max-width: 340px; width: 100%; }
    .heart { font-size: 56px; margin-bottom: 16px; display: block; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
    h1 { font-size: 24px; margin-bottom: 8px; }
    .sub { color: #aaa; font-size: 14px; margin-bottom: 32px; }
    .steps { background: #1a1a1a; border-radius: 16px; padding: 20px; margin-bottom: 24px; text-align: left; }
    .step { display: flex; align-items: center; gap: 12px; padding: 8px 0; font-size: 14px; color: #ccc; }
    .step span { background: #ff3c00; color: white; border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; flex-shrink: 0; }
    .btn {
      width: 100%; padding: 16px; border-radius: 14px;
      background: #ff3c00; color: white; border: none;
      font-size: 17px; font-weight: 600; cursor: pointer;
    }
    #status { margin-top: 16px; font-size: 14px; color: #aaa; min-height: 20px; }
  </style>
</head>
<body>
  <div class="container">
    <span class="heart">💌</span>
    <h1>Enable Notifications</h1>
    <p class="sub">So you can receive messages from your Delband</p>

    <div class="steps">
      <div class="step"><span>1</span> Open this page in Safari</div>
      <div class="step"><span>2</span> Tap Share → "Add to Home Screen"</div>
      <div class="step"><span>3</span> Open from Home Screen icon</div>
      <div class="step"><span>4</span> Tap the button below ↓</div>
    </div>

    <button class="btn" id="btn" onclick="subscribe()">Enable Notifications 🔔</button>
    <div id="status"></div>
  </div>
</body>
</html>
