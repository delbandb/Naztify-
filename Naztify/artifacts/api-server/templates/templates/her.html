<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="💌"/>
  <title>💌</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0e0a0d;
      --card: #1a1118;
      --border: rgba(255,255,255,0.07);
      --muted: #7a6070;
      --text: #f0e8ec;
      --gold: #d4a96a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh; min-height: 100dvh;
      color: var(--text);
      display: flex; align-items: center; justify-content: center;
      padding: env(safe-area-inset-top,20px) 24px env(safe-area-inset-bottom,24px);
      background-image:
        radial-gradient(ellipse at 20% 60%, rgba(60,10,80,0.5) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 20%, rgba(80,10,30,0.4) 0%, transparent 50%);
    }
    .container { width: 100%; max-width: 360px; text-align: center; }

    #waiting { display: flex; flex-direction: column; align-items: center; gap: 10px; }
    .puffin-svg { width: 220px; height: 220px; }

    @keyframes orbit  { from{transform:rotate(0deg)}  to{transform:rotate(-360deg)} }
    @keyframes counter{ from{transform:rotate(0deg)}  to{transform:rotate(360deg)}  }
    @keyframes legL   { 0%,100%{transform:rotate(-25deg)} 50%{transform:rotate(25deg)}  }
    @keyframes legR   { 0%,100%{transform:rotate(25deg)}  50%{transform:rotate(-25deg)} }
    @keyframes bob    { 0%,100%{transform:translateY(0)}  50%{transform:translateY(-2px)} }
    @keyframes blink  { 0%,80%,100%{opacity:0.3} 40%{opacity:1} }

    .orbitG   { transform-origin:110px 110px; animation:orbit 5s linear infinite; }
    .counterG { animation:counter 5s linear infinite; transform-origin:11px 28px; }
    .bobG     { animation:bob 0.5s ease-in-out infinite; }
    .ll       { transform-origin:8px 2px;  animation:legL 0.5s ease-in-out infinite; }
    .lr       { transform-origin:15px 2px; animation:legR 0.5s ease-in-out infinite; }
    .bdot     { animation:blink 1.4s ease-in-out infinite; }
    .d2       { animation-delay:0.2s; }
    .d3       { animation-delay:0.4s; }

    .waiting-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px; font-style: italic;
      color: rgba(240,232,236,0.5); margin-top: 4px;
    }
    .waiting-sub { font-size: 12px; color: var(--muted); letter-spacing: 0.4px; }

    #message-view { display: none; width: 100%; }

    .mood-card {
      border-radius: 28px; padding: 36px 24px 28px;
      margin-bottom: 24px; position: relative; overflow: hidden;
      animation: popIn 0.5s cubic-bezier(0.175,0.885,0.32,1.275);
    }
    @keyframes popIn { from{transform:scale(0.85);opacity:0} to{transform:scale(1);opacity:1} }
    .mood-card::before {
      content:''; position:absolute; inset:0;
      background:rgba(255,255,255,0.08); border-radius:inherit;
    }
    .mood-emoji-big {
      font-size:64px; display:block; margin-bottom:16px;
      animation: floaty 3s ease-in-out infinite;
    }
    @keyframes floaty { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
    .from-label {
      font-size:11px; text-transform:uppercase;
      letter-spacing:2px; color:rgba(30,10,20,0.6);
      margin-bottom:8px; font-weight:500;
    }
    .mood-message {
      font-family:'Cormorant Garamond',serif;
      font-size:28px; font-weight:600; color:#1a0a10; line-height:1.2;
    }
    .mood-time { font-size:11px; color:rgba(30,10,20,0.5); margin-top:10px; }

    .reply-label {
      font-size:10px; text-transform:uppercase;
      letter-spacing:2px; color:var(--gold);
      margin-bottom:14px; font-weight:500;
    }
    .reply-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; }
    .reply-btn {
      background:var(--card); border:1px solid var(--border);
      border-radius:16px; padding:16px 10px; color:var(--text);
      font-family:'DM Sans',sans-serif; font-size:13px; cursor:pointer;
      transition:all 0.15s; text-align:center; line-height:1.4;
    }
    .reply-btn .re { display:block; font-size:24px; margin-bottom:6px; }
    .reply-btn:active { transform:scale(0.95); background:rgba(255,255,255,0.08); }
    .reply-btn.selected { border-color:var(--gold); background:rgba(212,169,106,0.12); }

    .replied-banner {
      background:var(--card); border:1px solid rgba(212,169,106,0.25);
      border-radius:14px; padding:14px 16px;
      font-size:14px; color:var(--gold); display:none;
    }
    .btn-back {
      width:100%; background:transparent; border:1px solid var(--border);
      border-radius:14px; padding:14px; color:var(--muted);
      font-family:'DM Sans',sans-serif; font-size:14px;
      cursor:pointer; margin-top:12px; transition:all 0.15s;
    }
    .btn-back:active { background:var(--card); }
  </style>
</head>
<body>
<div class="container">

  <div id="waiting">
    <svg class="puffin-svg" viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg">
      <circle cx="110" cy="110" r="80" fill="none" stroke="rgba(212,169,106,0.15)" stroke-width="1" stroke-dasharray="4 8"/>
      <g class="orbitG">
        <g transform="translate(99,12)">
          <g class="counterG">
            <g class="bobG">
              <ellipse cx="11" cy="52" rx="9" ry="2.5" fill="rgba(0,0,0,0.12)"/>
              <g class="ll">
                <rect x="5" y="36" width="3.5" height="11" rx="1.5" fill="#e8914a"/>
                <rect x="1" y="46" width="8" height="2.5" rx="1" fill="#e8914a"/>
              </g>
              <g class="lr">
                <rect x="13" y="36" width="3.5" height="11" rx="1.5" fill="#e8914a"/>
                <rect x="10" y="46" width="8" height="2.5" rx="1" fill="#e8914a"/>
              </g>
              <ellipse cx="11" cy="24" rx="11" ry="14" fill="#f0ece8"/>
              <ellipse cx="11" cy="20" rx="10" ry="12" fill="#1c1c2e"/>
              <ellipse cx="11" cy="27" rx="7.5" ry="9" fill="#f0ece8"/>
              <ellipse cx="1.5" cy="21" rx="2.5" ry="7" fill="#1c1c2e" transform="rotate(-12,1.5,21)"/>
              <ellipse cx="20.5" cy="21" rx="2.5" ry="7" fill="#1c1c2e" transform="rotate(12,20.5,21)"/>
              <g transform="translate(22,0) scale(-1,1)">
                <circle cx="11" cy="9" r="9" fill="#1c1c2e"/>
                <ellipse cx="11.5" cy="10" rx="5" ry="6" fill="#f0ece8"/>
                <circle cx="14" cy="8" r="2.2" fill="#f0ece8"/>
                <circle cx="14.3" cy="7.8" r="1.1" fill="#1c1c2e"/>
                <circle cx="14.8" cy="7.3" r="0.4" fill="white"/>
                <path d="M15 11 L24 12.5 L22 16 L15 14.5 Z" fill="#e07830"/>
                <path d="M15 13 L24 14.2" stroke="#b85a18" stroke-width="0.8" fill="none"/>
                <rect x="19" y="11.5" width="3.5" height="1.8" rx="0.6" fill="#f5c030"/>
              </g>
            </g>
          </g>
        </g>
      </g>
      <circle class="bdot"    cx="96"  cy="185" r="2.5" fill="rgba(212,169,106,0.35)"/>
      <circle class="bdot d2" cx="110" cy="185" r="2.5" fill="rgba(212,169,106,0.35)"/>
      <circle class="bdot d3" cx="124" cy="185" r="2.5" fill="rgba(212,169,106,0.35)"/>
    </svg>
    <p class="waiting-title">waiting for Delband</p>
    <p class="waiting-sub">please dandoon ru jigar bezar</p>
  </div>

  <div id="message-view">
    <div class="mood-card" id="mood-card">
      <span class="mood-emoji-big" id="msg-emoji">💌</span>
      <div class="from-label">Delband says</div>
      <div class="mood-message" id="msg-text"></div>
      <div class="mood-time" id="msg-time"></div>
    </div>
    <div class="reply-label">How do you feel?</div>
    <div class="reply-grid" id="reply-grid"></div>
    <div class="replied-banner" id="replied-banner">✓ Reply sent 💕</div>
    <button class="btn-back" onclick="showWaiting()">← Back</button>
  </div>

</div>
<script>
  const MOODS = {
    thinking: { yes:"I'm thinking about you too", yesEmoji:"👀", no:"Nemikham", noEmoji:"😒" },
    missing:  { yes:"I miss you too",              yesEmoji:"🥺", no:"Nemikham", noEmoji:"😒" },
    mood:     { yes:"Manam",                       yesEmoji:"🫦", no:"Nemikham", noEmoji:"😒" },
    sorry:    { yes:"Qose nakhor",                 yesEmoji:"🥺", no:"Nemikham", noEmoji:"😒" },
    custom:   { yes:"❤️",                          yesEmoji:"❤️", no:"😒",       noEmoji:"😒" },
  };

  let currentMessage = null;
  let seenId = null;
  let replied = false;

  function timeAgo(ms) {
    const s = Math.floor((Date.now() - ms) / 1000);
    if (s < 60)   return 'just now';
    if (s < 3600) return `${Math.floor(s/60)}m ago`;
    return `${Math.floor(s/3600)}h ago`;
  }

  function showMessage(msg) {
    currentMessage = msg;
    replied = !!msg.reply;
    document.getElementById('waiting').style.display = 'none';
    document.getElementById('message-view').style.display = 'block';
    document.getElementById('msg-emoji').textContent = msg.emoji || '💌';
    document.getElementById('msg-text').textContent = msg.message;
    document.getElementById('msg-time').textContent = timeAgo(msg.sentAt);
    const colors = {
      thinking:'linear-gradient(145deg,#e9d5ff,#c084fc)',
      missing: 'linear-gradient(145deg,#fce7f3,#f9a8d4)',
      mood:    'linear-gradient(145deg,#ffe4e6,#fb7185)',
      sorry:   'linear-gradient(145deg,#dbeafe,#60a5fa)',
      custom:  'linear-gradient(145deg,#fce7f3,#e8445a)',
    };
    document.getElementById('mood-card').style.background = colors[msg.moodId] || colors.custom;
    const mood = MOODS[msg.moodId] || MOODS.custom;
    const grid = document.getElementById('reply-grid');
    grid.innerHTML = `
      <button class="reply-btn ${replied && msg.reply === mood.yes ? 'selected':''}"
        onclick="sendReply('${mood.yes.replace(/'/g,"\\'")}','${mood.yesEmoji}')">
        <span class="re">${mood.yesEmoji}</span>${mood.yes}
      </button>
      <button class="reply-btn ${replied && msg.reply === mood.no ? 'selected':''}"
        onclick="sendReply('${mood.no.replace(/'/g,"\\'")}','${mood.noEmoji}')">
        <span class="re">${mood.noEmoji}</span>${mood.no}
      </button>
    `;
    const banner = document.getElementById('replied-banner');
    banner.style.display = replied ? 'block' : 'none';
    grid.style.display   = replied ? 'none'  : 'grid';
  }

  function showWaiting() {
    document.getElementById('waiting').style.display = 'flex';
    document.getElementById('message-view').style.display = 'none';
  }

  async function sendReply(reply, replyEmoji) {
    if (!currentMessage || replied) return;
    try {
      await fetch('/api/reply', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({ messageId:currentMessage.id, reply, replyEmoji })
      });
      replied = true;
      document.getElementById('reply-grid').style.display = 'none';
      document.getElementById('replied-banner').style.display = 'block';
    } catch {}
  }

  async function poll() {
    try {
      const res  = await fetch('/api/latest');
      const data = await res.json();
      const msg  = data.message;
      if (msg && msg.id !== seenId) {
        seenId = msg.id;
        showMessage(msg);
      }
    } catch {}
  }

  setInterval(poll, 3000);
  poll();
</script>
</body>
</html>
