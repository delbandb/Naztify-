<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Send Love"/>
  <title>💌 Send Love</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0e0a0d;
      --card: #1a1118;
      --border: rgba(255,255,255,0.07);
      --muted: #7a6070;
      --text: #f0e8ec;
      --accent: #e8445a;
      --gold: #d4a96a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh; min-height: 100dvh;
      color: var(--text);
      padding: env(safe-area-inset-top, 20px) 20px env(safe-area-inset-bottom, 20px);
      background-image:
        radial-gradient(ellipse at 15% 40%, rgba(80,10,30,0.5) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 10%, rgba(40,10,60,0.4) 0%, transparent 50%);
    }

    .header {
      text-align: center;
      padding: 28px 0 24px;
    }
    .heart {
      font-size: 40px;
      display: block;
      margin-bottom: 10px;
      animation: heartbeat 2.4s ease-in-out infinite;
    }
    @keyframes heartbeat {
      0%,100%{transform:scale(1)}
      14%{transform:scale(1.15)}
      28%{transform:scale(1)}
      42%{transform:scale(1.1)}
      56%{transform:scale(1)}
    }
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 26px; font-weight: 600;
      letter-spacing: -0.3px;
    }
    h1 em { color: var(--accent); font-style: italic; }
    .subtitle { color: var(--muted); font-size: 12px; margin-top: 4px; letter-spacing: 0.4px; }

    /* Reply banner */
    #reply-banner {
      display: none;
      background: var(--card);
      border: 1px solid rgba(212,169,106,0.3);
      border-radius: 16px;
      padding: 14px 16px;
      margin-bottom: 20px;
      animation: slideIn 0.4s ease;
    }
    @keyframes slideIn { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
    .reply-label { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: var(--gold); margin-bottom: 6px; }
    .reply-text { font-size: 16px; }

    .section-label {
      font-size: 10px; text-transform: uppercase;
      letter-spacing: 2px; color: var(--gold);
      margin-bottom: 12px; font-weight: 500;
    }

    .mood-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 24px; }
    .mood-btn {
      border: none; border-radius: 20px;
      padding: 22px 14px 18px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 400;
      cursor: pointer; text-align: center;
      line-height: 1.4; color: #1a0a10;
      transition: transform 0.15s, box-shadow 0.15s;
      position: relative; overflow: hidden;
    }
    .mood-btn::after {
      content: '';
      position: absolute; inset: 0;
      background: rgba(255,255,255,0.15);
      opacity: 0; transition: opacity 0.15s;
    }
    .mood-btn:active { transform: scale(0.95); }
    .mood-btn:active::after { opacity: 1; }
    .mood-btn .emoji { display: block; font-size: 32px; margin-bottom: 8px; }
    .mood-btn .label { font-weight: 500; }

    .m-thinking { background: linear-gradient(145deg, #e9d5ff, #c084fc); }
    .m-missing  { background: linear-gradient(145deg, #fce7f3, #f9a8d4); }
    .m-mood     { background: linear-gradient(145deg, #ffe4e6, #fb7185); }
    .m-sorry    { background: linear-gradient(145deg, #dbeafe, #60a5fa); }

    .divider { display:flex; align-items:center; gap:10px; margin-bottom:16px; }
    .divider::before,.divider::after { content:''; flex:1; height:1px; background:var(--border); }
    .divider span { font-size:10px; text-transform:uppercase; letter-spacing:2px; color:var(--muted); }

    .custom-box {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 18px; padding: 16px; margin-bottom: 12px;
    }
    textarea {
      width: 100%; background: transparent; border: none; outline: none;
      color: var(--text); font-family: 'DM Sans', sans-serif;
      font-size: 15px; font-weight: 300; resize: none; line-height: 1.6;
      min-height: 72px;
    }
    textarea::placeholder { color: rgba(255,255,255,0.18); }

    .btn-send {
      width: 100%; background: var(--accent); border: none;
      border-radius: 14px; padding: 16px; color: #fff;
      font-family: 'DM Sans', sans-serif; font-size: 15px;
      font-weight: 500; cursor: pointer; transition: all 0.15s;
      letter-spacing: 0.2px;
    }
    .btn-send:active { transform: scale(0.97); background: #d63550; }

    #status {
      text-align: center; margin-top: 14px; font-size: 13px;
      color: var(--muted); min-height: 18px;
    }
    #status.ok  { color: #6fcf97; }
    #status.err { color: var(--accent); }
  </style>
</head>
<body>
  <div class="header">
    <span class="heart">💌</span>
    <h1>Send her <em>love</em></h1>
    <p class="subtitle">She'll feel it instantly</p>
  </div>

  <div id="reply-banner">
    <div class="reply-label">She replied</div>
    <div class="reply-text" id="reply-text"></div>
  </div>

  <div class="section-label">How are you feeling?</div>
  <div class="mood-grid">
    <button class="mood-btn m-thinking" onclick="sendMood('thinking','I\'m thinking about you','👀','#c084fc')">
      <span class="emoji">👀</span><span class="label">Thinking about her</span>
    </button>
    <button class="mood-btn m-missing" onclick="sendMood('missing','I miss you','🥺','#f9a8d4')">
      <span class="emoji">🥺</span><span class="label">Missing her</span>
    </button>
    <button class="mood-btn m-mood" onclick="sendMood('mood','I\'m in the mood','🫦','#fb7185')">
      <span class="emoji">🫦</span><span class="label">I'm in the mood</span>
    </button>
    <button class="mood-btn m-sorry" onclick="sendMood('sorry','I\'m sad & sorry','☹️','#60a5fa')">
      <span class="emoji">☹️</span><span class="label">Sad & sorry</span>
    </button>
  </div>

  <div class="divider"><span>or write something</span></div>
  <div class="custom-box">
    <textarea id="custom" placeholder="Write her something personal..."></textarea>
  </div>
  <button class="btn-send" onclick="sendCustom()">Send ✉️</button>
  <div id="status"></div>

  <script>
    let lastReplyAt = null;

    async function sendMood(moodId, message, emoji, color) {
      setStatus('Sending...', '');
      try {
        const res = await fetch('/api/send', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ moodId, message, emoji, color })
        });
        const data = await res.json();
        if (data.success) {
          setStatus('✅ Sent! Waiting for her reply...', 'ok');
        } else {
          setStatus('❌ Something went wrong', 'err');
        }
      } catch {
        setStatus('❌ Could not reach server', 'err');
      }
    }

    async function sendCustom() {
      const msg = document.getElementById('custom').value.trim();
      if (!msg) return;
      await sendMood('custom', msg, '💌', '#e8445a');
      document.getElementById('custom').value = '';
    }

    function setStatus(msg, cls) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = cls;
    }

    // Poll for her reply every 3 seconds
    async function pollReply() {
      try {
        const res = await fetch('/api/status');
        const data = await res.json();
        const latest = data.latest;
        if (latest && latest.reply && latest.replyAt !== lastReplyAt) {
          lastReplyAt = latest.replyAt;
          const banner = document.getElementById('reply-banner');
          document.getElementById('reply-text').textContent = `${latest.replyEmoji} ${latest.reply}`;
          banner.style.display = 'block';
          setStatus('', '');
        }
      } catch {}
    }

    setInterval(pollReply, 3000);
    pollReply();
  </script>
</body>
</html>
